# ProteinTTT Configuration — Continue MartsDB Enzymes with MSA
# Resumes from: lr_0.04_ags_8_msa_True_grad_1.0_random_3984414
# The script skips sequences whose output PDB already exists.

# Data settings — point directly at the existing experiment output directory
df_path: "/scratch/project/open-35-8/pimenol1/ProteinTTT/ProteinTTT_fresh/data/marts_db/experements_output/lr_0.04_ags_8_msa_True_grad_1.0_random_3984414"
max_sequence_length: 470
use_true_pdb: false
use_chain_name: false
new_experement_dir: false

# Test-Time Training settings (identical to original run)
msa: true
msa_sampling_strategy: "random"
gradient_clip: true
renumber_pdb: false
gradient_clip_max_norm: 1.0
compute_step_metrics: false
confidence_collapse_ratio: 0.5
confidence_collapse_patience: 3
steps: 100
lr: 0.04
lora_rank: 128
lora_alpha: 256
ags: 8

seed: 0

# Output paths (relative to df_path)
output:
  esm_ttt_dir: "predicted_structures/ESMFold_ProteinTTT"
  esm_dir: "predicted_structures/ESMFold"
  logs_dir: "logs"
  plots_dir: "plots"
  results_file: "results.tsv"
  execution_log: "execution.log"

input:
  summary_file: "summary.csv"
  pdb_dir: ""
  msa_dir: "/scratch/project/open-35-8/pimenol1/ProteinTTT/ProteinTTT_fresh/data/marts_db/msa"

columns:
  id_column: "id"
  sequence_column: "sequence"
  chain_id_column: "chain_id"
